{{- if .Values.serviceExt.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: icp-alb-svc
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "alb"
    external-dns.alpha.kubernetes.io/evaluateTargetHealth: 'true'
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.serviceExt.annotations.domainName | quote }}
    "meta.helm.sh/release-name": icp-bidon
    service.beta.kubernetes.io/aws-load-balancer-subnets: {{ .Values.serviceExt.annotations.subnetAllowList | quote }}
    # service.beta.kubernetes.io/aws-load-balancer-scheme: Internet-facing
    service.beta.kubernetes.io/aws-load-balancer-private-ipv4-addresses: internal
    service.beta.kubernetes.io/aws-load-balancer-internal: 'true'
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-unhealthy-threshold: "2" # Default 6
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: ssl
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: {{ .Values.serviceExt.annotations.acmCertificateArn | quote }}
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: '8081'

spec:
  type: LoadBalancer
  selector:
    app: xroad-cs
  ports:
    - port: 8081
      protocol: TCP
      name: client-https
{{- end }}